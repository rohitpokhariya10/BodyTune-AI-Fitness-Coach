<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BodyTune AI premium fitness SaaS for training, nutrition, analytics, and AI coaching."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>BodyTune AI</title>
    <script>
      (() => {
        const theme = localStorage.getItem("bodytune-theme");
        const nextTheme = theme === "light" || theme === "dark" ? theme : "dark";
        document.documentElement.classList.add(nextTheme);
        document.documentElement.style.colorScheme = "dark";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
